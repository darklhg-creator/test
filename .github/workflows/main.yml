name: Stock Analysis with EPS

on:
  schedule:
    # 매일 오후 4시(한국시간) 실행 (UTC 07:00)
    - cron: '0 7 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 호환성 문제가 없는 황금 버전을 직접 지정해서 설치합니다.
          pip install numpy==1.24.3
          pip install pandas==2.0.3
          pip install requests pykrx finance-datareader

      - name: Run script
        run: python start.py
