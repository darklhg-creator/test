name: Stock Analysis with EPS

on:
  schedule:
    # 매일 오후 4시(한국시간) 실행 (UTC 07:00)
    - cron: '0 7 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 3.9에서 3.10으로 업그레이드 (더 안정적임)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 대소문자 문제와 의존성 문제를 해결하기 위해 아래와 같이 설치합니다.
          pip install pandas==2.0.3 requests
          pip install financedatareader pykrx

      - name: Run script
        run: python start.py
