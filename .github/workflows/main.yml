name: Stock Analysis with EPS

on:
  schedule:
    # 매일 오후 4시(한국시간) 실행 (UTC 07:00)
    - cron: '0 7 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # finance-datareader (하이픈 포함) 또는 소문자 조합을 모두 시도합니다.
          pip install pandas==2.0.3 requests pykrx finance-datareader
          # 만약 위 명령어로도 안될 경우를 대비해 직접 경로 설치 명령어를 추가해도 됩니다.

      - name: Run script
        run: python start.py
