name: Stock Analysis with EPS

on:
  schedule:
    # 매일 오후 4시(한국시간) 실행 (UTC 07:00)
    - cron: '0 7 * * *'
  workflow_dispatch: # 수동 실행 버튼 생성

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests FinanceDataReader pykrx

      - name: Run script
        run: python start.py
